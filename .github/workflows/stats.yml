name: generate stats

on:
  # Run automatically every day at 00:00
  schedule:
    - cron: "0 0 * * *" 
  
  # Allows to manually run the job at any time
  workflow_dispatch:
  
  # Run on every push on the main branch
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate github-stats.svg
        uses: wei/curl@v1
        with:
          args: --upload-file dist/github-stats.svg https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_border=true&hide_title=true&line_height=22&disable_animations=true

      - name: generate github-stats-dark.svg
        uses: wei/curl@v1
        with:
          args: --upload-file dist/github-stats-dark.svg https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_border=true&hide_title=true&line_height=22&disable_animations=true&theme=dark

      # Push the content of <build_dir> to a branch
      # the content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/<target_branch>/<file> , or as github page
      - name: push github-stats.svg and github-stats-dark.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v2.6.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
